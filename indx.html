<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space War 🚀</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    overflow: hidden;
    background: #05051a;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

canvas {
    display: block;
    margin: auto;
    background: linear-gradient(#05051a, #101044);
}

#info {
    position: fixed;
    top: 10px;
    left: 0;
    right: 0;
    z-index: 2;
    font-size: 20px;
    font-weight: bold;
}

#start {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 15px 30px;
    font-size: 22px;
    background: #00aaff;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="info">
امتیاز: <span id="score">0</span>
&nbsp;&nbsp; ❤️ جان: <span id="lives">3</span>
</div>

<button id="start">شروع بازی 🚀</button>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player;
let bullets = [];
let enemies = [];
let score = 0;
let lives = 3;
let gameRunning = false;

function createPlayer() {
    player = {
        x: canvas.width / 2 - 25,
        y: canvas.height - 80,
        width: 50,
        height: 50,
        speed: 7
    };
}

const keys = {};

document.addEventListener("keydown", function(e) {
    keys[e.key] = true;

    if (e.key === " ") {
        shoot();
    }
});

document.addEventListener("keyup", function(e) {
    keys[e.key] = false;
});

function shoot() {
    if (!gameRunning) return;

    bullets.push({
        x: player.x + player.width / 2 - 3,
        y: player.y,
        width: 6,
        height: 15,
        speed: 10
    });
}

function createEnemy() {
    enemies.push({
        x: Math.random() * (canvas.width - 40),
        y: -50,
        width: 40,
        height: 40,
        speed: 2 + Math.random() * 3
    });
}

function update() {

    if (!gameRunning) return;

    // حرکت بازیکن
    if (keys["ArrowLeft"] || keys["a"]) {
        player.x -= player.speed;
    }

    if (keys["ArrowRight"] || keys["d"]) {
        player.x += player.speed;
    }

    if (player.x < 0) {
        player.x = 0;
    }

    if (player.x + player.width > canvas.width) {
        player.x = canvas.width - player.width;
    }

    // حرکت تیرها
    bullets.forEach((bullet, index) => {
        bullet.y -= bullet.speed;

        if (bullet.y < 0) {
            bullets.splice(index, 1);
        }
    });

    // حرکت دشمن‌ها
    enemies.forEach((enemy, index) => {

        enemy.y += enemy.speed;

        if (enemy.y > canvas.height) {
            enemies.splice(index, 1);
            lives--;

            document.getElementById("lives").textContent = lives;

            if (lives <= 0) {
                gameOver();
            }
        }
    });

    // برخورد تیر با دشمن
    bullets.forEach((bullet, bIndex) => {

        enemies.forEach((enemy, eIndex) => {

            if (
                bullet.x < enemy.x + enemy.width &&
                bullet.x + bullet.width > enemy.x &&
                bullet.y < enemy.y + enemy.height &&
                bullet.y + bullet.height > enemy.y
            ) {

                bullets.splice(bIndex, 1);
                enemies.splice(eIndex, 1);

                score += 10;

                document.getElementById("score").textContent = score;
            }
        });
    });
}

function drawPlayer() {

    ctx.font = "50px Arial";
    ctx.fillText("🚀", player.x, player.y + 45);
}

function drawBullets() {

    ctx.fillStyle = "yellow";

    bullets.forEach(bullet => {
        ctx.fillRect(
            bullet.x,
            bullet.y,
            bullet.width,
            bullet.height
        );
    });
}

function drawEnemies() {

    ctx.font = "40px Arial";

    enemies.forEach(enemy => {
        ctx.fillText("👾", enemy.x, enemy.y + 35);
    });
}

function drawStars() {

    for (let i = 0; i < 80; i++) {

        let x = Math.random() * canvas.width;
        let y = Math.random() * canvas.height;

        ctx.fillStyle = "white";
        ctx.fillRect(x, y, 2, 2);
    }
}

function gameLoop() {

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    drawStars();

    if (gameRunning) {

        update();

        drawPlayer();
        drawBullets();
        drawEnemies();
    }

    requestAnimationFrame(gameLoop);
}

function startGame() {

    score = 0;
    lives = 3;

    bullets = [];
    enemies = [];

    document.getElementById("score").textContent = score;
    document.getElementById("lives").textContent = lives;

    createPlayer();

    gameRunning = true;

    document.getElementById("start").style.display = "none";
}

function gameOver() {

    gameRunning = false;

    document.getElementById("start").style.display = "block";

    document.getElementById("start").textContent =
        "بازی تمام شد 😢 | دوباره شروع کن";
}

document.getElementById("start").addEventListener(
    "click",
    startGame
);

setInterval(() => {

    if (gameRunning) {
        createEnemy();
    }

}, 800);

window.addEventListener("resize", () => {

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

});

gameLoop();

</script>

</body>
</html>
